<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSmart e-commerce</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">SHOP<span>SMART</span></div>
            <ul class="nav-links" id="auth-links">
            </ul>
        </nav>
    </header>

    <div class="container">
        <section id="home" class="active">
            <div class="hero">
                <h1>SHOP EASY, SHOP QUALITY<br>LET'S GET THE SHOPPING STARTED!</h1>
                <p>Elevate your shopping experience with our quality products and trusted service.</p>
                 <div class="marquee-container">
                <div class="marquee-content">
                    <img src="https://cdn-images.farfetch-contents.com/33/04/89/26/33048926_63739315_1000.jpg" alt="">
                    <img src="https://ng.jumia.is/3C35PnHs-ezUbG3H-XMwqgmwGEI=/fit-in/500x500/filters:fill(white)/product/06/7994414/1.jpg?7088" alt="">
                    <img src="https://ng.jumia.is/unsafe/fit-in/300x300/filters:fill(white)/product/99/5893904/1.jpg?8124" alt="">
                    <img src="https://ng.jumia.is/unsafe/fit-in/300x300/filters:fill(white)/product/97/3040914/1.jpg?1273" alt="">
                    <img src="https://img.kwcdn.com/product/fancy/69f2ccd2-5d63-4aa8-a03f-2c6329ef5942.jpg?imageView2/2/w/800/q/70/format/avif" alt="">
                    <img src="https://img.kwcdn.com/product/open/9603462a7df94cfb912e01b1642febc7-goods.jpeg?imageView2/2/w/800/q/70/format/avif" alt="">
                    <img src="https://img.kwcdn.com/product/fancy/0a0726f9-0aec-4782-96b9-cf5a13428bce.jpg?imageView2/2/w/800/q/70/format/avif" alt="">
                    <img src="https://ng.jumia.is/unsafe/fit-in/300x300/filters:fill(white)/product/12/3568814/1.jpg?0728" alt="">
                    <img src="https://img.kwcdn.com/product/fancy/4d57e720-2559-499f-a3a5-a994fbcee694.jpg?imageView2/2/w/800/q/70/format/avif" alt="">
                    <img src="https://image.icebox.com/unsafe/400x0/filters:format(webp)/icebox-jewelry.s3.amazonaws.com/products/0c48d09152591f5ce212f46ce909dfbd.jpg" alt="">
                    <img src="https://ng.jumia.is/unsafe/fit-in/300x300/filters:fill(white)/product/22/6507904/1.jpg?6668" alt="">
                    <img src="https://m.media-amazon.com/images/I/71d0pZm9l9L.jpg" alt="">
                    <img src="https://ng.jumia.is/unsafe/fit-in/300x300/filters:fill(white)/product/06/0509104/1.jpg?4967" alt="">
                    <img src="https://pictures-nigeria.jijistatic.net/188664278_MzAwLTQwMC00MWQ0NWNmODYz.webp" alt="">
                    <img src="https://ng.jumia.is/unsafe/fit-in/300x300/filters:fill(white)/product/82/1990914/1.jpg?1422" alt="">
                    <img src="https://ng.jumia.is/unsafe/fit-in/300x300/filters:fill(white)/product/47/9150914/1.jpg?5984" alt="">
                    <img src="https://pictures-nigeria.jijistatic.net/187039957_MzAwLTI5OS1hZTkyM2I4ZTJh.webp" alt="">
                    <img src="https://img.kwcdn.com/product/fancy/1e92bcca-e220-4b2d-b08b-9465b40940cd.jpg?imageView2/2/w/800/q/70/format/avif" alt="">
                </div>
            </div>
                <div class="hero-btns">
                    <button class="btn-primary" onclick="showSection('shop')">Shop Now</button>
                </div>
            </div>
        </section>

        <section id="login">
            <h2 class="section-title">Login</h2>
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label for="login-pass">Password</label>
                    <input type="password" id="login-pass" required>
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>
        </section>

        <section id="signup">
            <h2 class="section-title">Sign Up</h2>
            <form id="signup-form" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" required>
                </div>
                <div class="form-group">
                    <label for="signup-pass">Password</label>
                    <input type="password" id="signup-pass" required>
                </div>
                <button type="submit" class="btn-primary">Create Account</button>
            </form>
        </section>

        <section id="shop">
            <div class="shop-header">
                <h2 class="section-title">Our Products</h2>
                <!-- <button id="logout-btn" class="btn-secondary hidden" onclick="logout()">Log Out</button> -->
            </div>
            <div class="product-grid" id="product-list">
            </div>
        </section>

        <section id="cart">
            <h2 class="section-title">Your Cart</h2>
            <div id="cart-content">
            </div>
            <div id="cart-summary" class="hidden">
                <div class="total">Total: $<span id="cart-total">0</span></div>
                <button class="btn-primary" onclick="showSection('checkout')">Proceed to Checkout</button>
            </div>
        </section>

        <section id="checkout">
            <h2 class="section-title">Checkout</h2>
            <form id="checkout-form" onsubmit="handleCheckout(event)">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="address">Shipping Address</label>
                    <textarea id="address" required></textarea>
                </div>
                <button type="submit" class="btn-primary">Complete Purchase</button>
            </form>
        </section>
    </div>
    <script type="module" src="firebase.js"></script>

    <script src="index.js"></script>
</body>
</html>
